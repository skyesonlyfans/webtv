<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTV by Skye</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #151518;
            --primary: #ff3e3e;
            --text: #ffffff;
            --text-dim: #888;
            --focus-glow: rgba(255, 62, 62, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Layout --- */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2.5rem; color: var(--primary); }

        /* --- Search Bar --- */
        .search-container {
            width: 100%;
            margin-bottom: 30px;
        }

        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 3px solid transparent;
            padding: 20px;
            font-size: 1.5rem;
            color: white;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--focus-glow);
        }

        /* --- Results Grid --- */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .card {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid transparent;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card .info { padding: 10px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .card.focused {
            border-color: var(--primary);
            transform: scale(1.08);
            z-index: 10;
        }

        /* --- TV Overlay (Episode Picker) --- */
        #tv-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .picker-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .picker-inputs { display: flex; gap: 20px; margin: 20px 0; }
        .picker-inputs input {
            width: 80px; padding: 15px; font-size: 1.5rem; text-align: center;
            background: #222; border: 2px solid #444; color: white; border-radius: 8px;
        }

        /* --- Player --- */
        #player-wrap {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 300;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>WebTV by Skye</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search movies or TV shows..." class="nav-target">
    </div>

    <div id="results">
        </div>
</div>

<div id="tv-overlay">
    <div class="picker-box">
        <h2 id="tv-title">TV Show Title</h2>
        <div class="picker-inputs">
            <div><label>S</label><br><input type="number" id="seasonInput" value="1" class="nav-target"></div>
            <div><label>E</label><br><input type="number" id="episodeInput" value="1" class="nav-target"></div>
        </div>
        <button id="confirmPlay" style="padding: 15px 30px; font-weight: bold;" class="nav-target">PLAY NOW</button>
    </div>
</div>

<div id="player-wrap">
    <iframe id="mapple-player" allowfullscreen allow="autoplay"></iframe>
</div>

<script>
    const TMDB_KEY = 'cf4df30d74d9e322e596d876fd7db13e';
    const MAPPLE_BASE = 'https://mappletv.uk/embed';
    
    let currentResults = [];
    let focusedIndex = -1;
    let currentMedia = null; // Stores selected TMDB object
    let section = 'search'; // search, results, picker, player

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('results');
    const tvOverlay = document.getElementById('tv-overlay');
    const playerWrap = document.getElementById('player-wrap');
    const playerFrame = document.getElementById('mapple-player');

    // --- Search Logic ---
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => performSearch(e.target.value), 500);
    });

    async function performSearch(query) {
        if (!query) return;
        const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`);
        const data = await resp.json();
        currentResults = data.results.filter(i => i.media_type !== 'person');
        renderResults();
    }

    function renderResults() {
        resultsContainer.innerHTML = '';
        currentResults.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w300${item.poster_path}" alt="poster">
                <div class="info">${item.title || item.name}</div>
            `;
            div.onclick = () => selectMedia(item);
            resultsContainer.appendChild(div);
        });
        focusedIndex = -1;
    }

    // --- Player Logic ---
    function selectMedia(item) {
        currentMedia = item;
        if (item.media_type === 'tv') {
            section = 'picker';
            document.getElementById('tv-title').innerText = item.name;
            tvOverlay.style.display = 'flex';
            document.getElementById('seasonInput').focus();
        } else {
            playMovie(item.id);
        }
    }

    function playMovie(id) {
        // Path structure: /embed/movie/{id}
        const url = `${MAPPLE_BASE}/movie/${id}`;
        launchPlayer(url);
    }

    function playTV(id, s, e) {
        // Path structure: /embed/tv/{id}/{s}/{e}
        const url = `${MAPPLE_BASE}/tv/${id}/${s}/${e}`;
        launchPlayer(url);
    }

    function launchPlayer(url) {
        section = 'player';
        playerWrap.style.display = 'block';
        playerFrame.src = url;
        // Push state for Android Back button
        history.pushState({view: 'player'}, '');
    }

    document.getElementById('confirmPlay').onclick = () => {
        const s = document.getElementById('seasonInput').value;
        const e = document.getElementById('episodeInput').value;
        playTV(currentMedia.id, s, e);
    };

    // --- Navigation Engine ---
    window.addEventListener('keydown', (e) => {
        if (section === 'player') return; // Let iframe handle remote if needed, or handle back

        const cards = document.querySelectorAll('.card');

        if (e.key === 'ArrowDown') {
            if (section === 'search') {
                section = 'results';
                focusedIndex = 0;
            } else if (section === 'results') {
                const rowItems = Math.floor(resultsContainer.offsetWidth / 200);
                focusedIndex = Math.min(focusedIndex + rowItems, currentResults.length - 1);
            }
        } else if (e.key === 'ArrowUp') {
            if (section === 'results') {
                const rowItems = Math.floor(resultsContainer.offsetWidth / 200);
                if (focusedIndex < rowItems) {
                    section = 'search';
                    focusedIndex = -1;
                    searchInput.focus();
                } else {
                    focusedIndex -= rowItems;
                }
            }
        } else if (e.key === 'ArrowRight' && section === 'results') {
            focusedIndex = Math.min(focusedIndex + 1, currentResults.length - 1);
        } else if (e.key === 'ArrowLeft' && section === 'results') {
            focusedIndex = Math.max(focusedIndex - 1, 0);
        } else if (e.key === 'Enter') {
            if (section === 'results' && focusedIndex !== -1) {
                selectMedia(currentResults[focusedIndex]);
            }
        } else if (e.key === 'Backspace' || e.key === 'Escape') {
            if (section === 'picker') {
                tvOverlay.style.display = 'none';
                section = 'results';
                e.preventDefault();
            }
        }

        updateFocus(cards);
    });

    function updateFocus(cards) {
        cards.forEach(c => c.classList.remove('focused'));
        if (section === 'results' && cards[focusedIndex]) {
            cards[focusedIndex].classList.add('focused');
            cards[focusedIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            searchInput.blur();
        }
    }

    // --- Event Handling (Mapple Docs) ---
    window.addEventListener('message', (event) => {
        // MappleTV emits standard player events via postMessage
        try {
            const msg = JSON.parse(event.data);
            if (msg.event === 'media_ended' || msg.event === 'close') {
                closePlayer();
            }
        } catch (err) {}
    });

    window.addEventListener('popstate', () => {
        closePlayer();
    });

    function closePlayer() {
        playerFrame.src = '';
        playerWrap.style.display = 'none';
        tvOverlay.style.display = 'none';
        section = 'search';
        searchInput.focus();
    }

</script>
</body>
</html>
