<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebTV by Skye</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --surface-color: #1c1c21;
            --primary-color: #0088ff;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --focus-ring: rgba(0, 136, 255, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden; /* Critical: Prevents scrolling on Android TV interfaces */
        }

        #menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            width: 380px;
            margin-bottom: 1.5rem;
        }

        label {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input {
            background-color: var(--surface-color);
            border: 2px solid #333;
            color: white;
            padding: 16px 20px;
            font-size: 1.3rem;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        button {
            background-color: var(--surface-color);
            border: 2px solid #333;
            color: white;
            padding: 16px 24px;
            font-size: 1.4rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            width: 380px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        /* TV Spatial Focus States */
        input:focus, button:focus, .focused {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--focus-ring);
            transform: scale(1.05);
            background-color: #2a2a35;
        }

        button.focused {
            background-color: var(--primary-color);
        }

        #player-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 100;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Temporary UI hint for user */
        .tv-hint {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 101;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--text-secondary);
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>WebTV by Skye</h1>
        
        <div class="form-group">
            <label for="tmdb">TMDB ID</label>
            <input type="text" id="tmdb" class="nav-item" placeholder="e.g., 550" autofocus>
        </div>
        
        <div class="form-group">
            <label for="epid">Episode ID (Optional)</label>
            <input type="text" id="epid" class="nav-item" placeholder="e.g., S1E1 or 1234">
        </div>
        
        <button id="playBtn" class="nav-item">Play via Mapple</button>
    </div>

    <div id="player-container">
        <div class="tv-hint" id="backHint">Press BACK to exit player</div>
        <div class="loading-overlay" id="loadingText">Loading Stream...</div>
        <iframe id="video-player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        /** * WebTV by Skye
         * Native Android TV App Web Wrapper with Spatial Navigation 
         */

        const navItems = Array.from(document.querySelectorAll('.nav-item'));
        let currentIndex = 0;

        // --- SPATIAL NAVIGATION ENGINE ---
        function updateFocus() {
            navItems.forEach(item => item.classList.remove('focused'));
            if (navItems[currentIndex]) {
                navItems[currentIndex].classList.add('focused');
                // The explicit `.focus()` call forces the Android TV keyboard to open when OK/Enter is pressed on inputs.
                navItems[currentIndex].focus();
            }
        }

        // Initialize focus on DOM load
        window.addEventListener('DOMContentLoaded', updateFocus);

        window.addEventListener('keydown', (e) => {
            const isPlayerOpen = document.getElementById('player-container').style.display === 'block';

            if (isPlayerOpen) {
                // TV Remotes typically map the native Back button to Escape, Backspace, or standard TV keycodes (27, 10009)
                if (e.key === 'Escape' || e.key === 'Backspace' || e.keyCode === 10009 || e.keyCode === 27) {
                    e.preventDefault();
                    history.back(); // Triggers popstate to gracefully close player
                }
                return;
            }

            // D-Pad Menu Navigation
            switch (e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    currentIndex = (currentIndex + 1) % navItems.length;
                    updateFocus();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    currentIndex = (currentIndex - 1 + navItems.length) % navItems.length;
                    updateFocus();
                    break;
                case 'Enter':
                    // If it's a button, explicitly trigger a click event to submit the action
                    if (navItems[currentIndex].tagName === 'BUTTON') {
                        e.preventDefault();
                        navItems[currentIndex].click();
                    }
                    break;
            }
        });

        // --- PLAYER INTEGRATION LOGIC ---
        document.getElementById('playBtn').addEventListener('click', () => {
            const tmdbId = document.getElementById('tmdb').value.trim();
            const epId = document.getElementById('epid').value.trim();
            
            if (!tmdbId) {
                alert("TMDB ID is required.");
                return;
            }

            /* * MappleTV Endpoint Construction 
             * Adjust base URL / parameter structures here based on endpoint configuration docs.
             */
            let mappleUrl = '';
            const baseUrl = 'https://mappletv.uk/embed';

            if (epId) {
                // Formatting for Series 
                mappleUrl = `${baseUrl}/tv?id=${tmdbId}&ep=${epId}`;
            } else {
                // Formatting for Movie
                mappleUrl = `${baseUrl}/movie?id=${tmdbId}`;
            }
            
            openPlayer(mappleUrl);
        });

        function openPlayer(url) {
            document.getElementById('menu-container').style.display = 'none';
            
            const playerContainer = document.getElementById('player-container');
            const iframe = document.getElementById('video-player');
            const loading = document.getElementById('loadingText');
            
            playerContainer.style.display = 'block';
            loading.style.display = 'block';
            
            // Push history state to hook into the native Android OS 'Back' button correctly
            history.pushState({ isPlayerOpen: true }, "Playing Video", "");
            
            iframe.src = url;
            iframe.onload = () => {
                loading.style.display = 'none';
            };

            // Flash a brief UX hint indicating how to leave full-screen playback
            const hint = document.getElementById('backHint');
            hint.style.opacity = 1;
            setTimeout(() => { hint.style.opacity = 0; }, 4000);
        }

        function closePlayer() {
            const iframe = document.getElementById('video-player');
            iframe.src = ""; // Nullify source to completely stop video/audio background processing
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('menu-container').style.display = 'flex';
            updateFocus(); // Return user seamlessly to their previous place in the menu
        }

        // Catch the history state to handle the physical "Back" remote button organically
        window.addEventListener('popstate', (e) => {
            const isPlayerOpen = document.getElementById('player-container').style.display === 'block';
            if (isPlayerOpen) {
                closePlayer();
            }
        });

        // --- IFRAME EVENT LISTENER ---
        // Listens to `postMessage` cross-origin events dispatched by the MappleTV iframe player
        window.addEventListener('message', (event) => {
            // Uncomment to restrict listening strictly to Mapple's domain for security:
            // if (!event.origin.includes('mappletv.uk')) return;
            
            try {
                // Account for both stringified JSON payloads and structured objects
                const payload = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                
                switch (payload.event || payload.type) {
                    case 'ready':
                        console.log('MappleTV: Player interface initialized');
                        break;
                    case 'play':
                        console.log('MappleTV: Stream started');
                        break;
                    case 'ended':
                        console.log('MappleTV: Media playback finished');
                        history.back(); // Automatically go back to menu when stream finishes
                        break;
                    case 'error':
                        console.error('MappleTV: Error loading media', payload.error);
                        alert('Could not stream media. Verify ID inputs.');
                        history.back(); // Gracefully exit on error
                        break;
                }
            } catch(e) {
                // Catch handler swallows extraneous postMessages unrelated to our target API logic
            }
        });

    </script>
</body>
</html>
