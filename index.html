<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebTV by Skye</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #1a1a1e;
            --primary: #0077ff;
            --text: #ffffff;
            --text-dim: #999;
            --focus-shadow: 0 0 25px rgba(0, 119, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 30px 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        h1 span { color: var(--primary); }

        /* --- Search Bar --- */
        .search-container {
            width: 100%;
            margin-bottom: 40px;
        }

        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 4px solid transparent;
            padding: 25px;
            font-size: 1.8rem;
            color: white;
            border-radius: 15px;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: var(--focus-shadow);
        }

        /* --- Results Grid --- */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }

        .card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card .info { 
            padding: 15px; 
            font-size: 1.1rem; 
            background: var(--surface);
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .card.focused {
            border-color: var(--primary);
            transform: scale(1.08);
            box-shadow: var(--focus-shadow);
            z-index: 10;
        }

        /* --- TV Overlay (Episode Picker) --- */
        #tv-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .picker-box {
            background: var(--surface);
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #333;
        }

        .picker-inputs { display: flex; gap: 30px; justify-content: center; margin: 30px 0; }
        .picker-inputs div { display: flex; flex-direction: column; align-items: center; }
        
        .picker-inputs label { font-size: 1rem; color: var(--text-dim); margin-bottom: 10px; }
        
        .picker-inputs input {
            width: 100px; padding: 20px; font-size: 2rem; text-align: center;
            background: #000; border: 3px solid #444; color: white; border-radius: 12px;
            outline: none;
        }

        .picker-inputs input:focus { border-color: var(--primary); }

        #confirmPlay {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }

        #confirmPlay:focus { transform: scale(1.1); box-shadow: var(--focus-shadow); }

        /* --- Player --- */
        #player-wrap {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 300;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Hide Scrollbar */
        #results::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>WebTV <span>by Skye</span></h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for a movie or TV show..." autocomplete="off">
    </div>

    <div id="results">
        </div>
</div>

<div id="tv-overlay">
    <div class="picker-box">
        <h2 id="tv-title" style="font-size: 2.2rem; margin: 0;">TV Show Title</h2>
        <div class="picker-inputs">
            <div>
                <label>SEASON</label>
                <input type="number" id="seasonInput" value="1" min="1">
            </div>
            <div>
                <label>EPISODE</label>
                <input type="number" id="episodeInput" value="1" min="1">
            </div>
        </div>
        <button id="confirmPlay">WATCH NOW</button>
    </div>
</div>

<div id="player-wrap">
    <iframe id="mapple-player" allowfullscreen allow="autoplay"></iframe>
</div>

<script>
    const TMDB_KEY = 'cf4df30d74d9e322e596d876fd7db13e';
    
    let currentResults = [];
    let focusedIndex = -1;
    let selectedShow = null;
    let viewMode = 'search'; // search, results, picker, player

    const searchInput = document.getElementById('searchInput');
    const resultsContainer = document.getElementById('results');
    const tvOverlay = document.getElementById('tv-overlay');
    const playerWrap = document.getElementById('player-wrap');
    const playerFrame = document.getElementById('mapple-player');

    // --- TMDB Search Logic ---
    let debounceTimer;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            if (e.target.value.length > 2) {
                searchTMDB(e.target.value);
            }
        }, 600);
    });

    async function searchTMDB(query) {
        try {
            const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`;
            const res = await fetch(url);
            const data = await res.json();
            // Filter to only shows and movies with posters
            currentResults = data.results.filter(item => (item.media_type === 'movie' || item.media_type === 'tv') && item.poster_path);
            renderCards();
        } catch (err) {
            console.error("Search failed", err);
        }
    }

    function renderCards() {
        resultsContainer.innerHTML = '';
        currentResults.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="https://image.tmdb.org/t/p/w400${item.poster_path}" alt="poster">
                <div class="info">${item.title || item.name}</div>
            `;
            card.onclick = () => handleSelect(item);
            resultsContainer.appendChild(card);
        });
        focusedIndex = -1;
    }

    // --- Navigation Logic (Android TV Remote) ---
    window.addEventListener('keydown', (e) => {
        if (viewMode === 'player') return;

        const cards = document.querySelectorAll('.card');

        switch(e.key) {
            case 'ArrowDown':
                if (viewMode === 'search') {
                    viewMode = 'results';
                    focusedIndex = 0;
                } else if (viewMode === 'results') {
                    const columns = Math.floor(resultsContainer.offsetWidth / 240);
                    if (focusedIndex + columns < currentResults.length) {
                        focusedIndex += columns;
                    }
                }
                break;
            case 'ArrowUp':
                if (viewMode === 'results') {
                    const columns = Math.floor(resultsContainer.offsetWidth / 240);
                    if (focusedIndex < columns) {
                        viewMode = 'search';
                        focusedIndex = -1;
                        searchInput.focus();
                    } else {
                        focusedIndex -= columns;
                    }
                }
                break;
            case 'ArrowRight':
                if (viewMode === 'results') {
                    focusedIndex = Math.min(focusedIndex + 1, currentResults.length - 1);
                }
                break;
            case 'ArrowLeft':
                if (viewMode === 'results') {
                    focusedIndex = Math.max(focusedIndex - 1, 0);
                }
                break;
            case 'Enter':
                if (viewMode === 'results' && focusedIndex !== -1) {
                    handleSelect(currentResults[focusedIndex]);
                }
                break;
            case 'Backspace':
            case 'Escape':
                if (viewMode === 'picker') {
                    closePicker();
                    e.preventDefault();
                } else if (viewMode === 'results') {
                    viewMode = 'search';
                    focusedIndex = -1;
                    searchInput.focus();
                    e.preventDefault();
                }
                break;
        }
        updateFocusUI(cards);
    });

    function updateFocusUI(cards) {
        cards.forEach(c => c.classList.remove('focused'));
        if (viewMode === 'results' && cards[focusedIndex]) {
            cards[focusedIndex].classList.add('focused');
            cards[focusedIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            searchInput.blur();
        }
    }

    // --- Action Handlers ---
    function handleSelect(item) {
        if (item.media_type === 'tv') {
            selectedShow = item;
            document.getElementById('tv-title').innerText = item.name;
            tvOverlay.style.display = 'flex';
            viewMode = 'picker';
            document.getElementById('seasonInput').focus();
        } else {
            // Movie URL: https://mapple.uk/watch/movie/{tmdb_id}
            play(`https://mapple.uk/watch/movie/${item.id}`);
        }
    }

    document.getElementById('confirmPlay').onclick = () => {
        const s = document.getElementById('seasonInput').value;
        const e = document.getElementById('episodeInput').value;
        // TV URL: https://mapple.uk/watch/tv/{tmdb_id}-{season}-{episode}
        play(`https://mapple.uk/watch/tv/${selectedShow.id}-${s}-${e}`);
    };

    function play(url) {
        viewMode = 'player';
        playerWrap.style.display = 'block';
        playerFrame.src = url;
        // Android TV "Back" support
        history.pushState({view: 'player'}, '');
    }

    function closePicker() {
        tvOverlay.style.display = 'none';
        viewMode = 'results';
    }

    window.onpopstate = function() {
        playerFrame.src = '';
        playerWrap.style.display = 'none';
        tvOverlay.style.display = 'none';
        viewMode = 'search';
        searchInput.focus();
    };

    // Initial focus
    window.onload = () => searchInput.focus();

</script>
</body>
</html>
